<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigestLog AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <style>
        :root {
            --primary: #2ecc71;
            --drink: #3498db;
            --danger: #e74c3c;
            --sleep: #9b59b6;
            --bg: #f5f6fa;
            --card: #ffffff;
            --text: #2f3640;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            box-sizing: border-box;
        }

        .header-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        h1 {
            color: #2c3e50;
            font-size: 22px;
            margin: 0;
        }

        #langSelect {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            background: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
        }

        .tab-navigation {
            display: flex;
            gap: 10px;
            width: 100%;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: #dcdde1;
            color: #7f8c8d;
            font-weight: bold;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
        }

        .tab-btn.active {
            background: #2c3e50;
            color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .tab-content {
            display: none;
            width: 100%;
        }

        .tab-content.active {
            display: block;
        }

        .section {
            background: var(--card);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-top: 6px solid var(--primary);
        }

        .section-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-top: 12px;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 600;
        }

        .datetime-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 10px;
        }

        input[type="date"], input[type="time"], input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            box-sizing: border-box;
            font-size: 14px;
        }

        .camera-btn {
            background-color: #f1f2f6;
            border: 2px dashed #ccc;
            color: #57606f;
            padding: 15px;
            border-radius: 8px;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            display: inline-block;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        .camera-btn input[type="file"] {
            display: none;
        }

        .preview-grid {
            display: none;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
        }

        .action-btn {
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            width: 100%;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }

        .grid-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .option-item {
            display: flex;
            align-items: center;
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
            cursor: pointer;
            font-size: 13px;
        }

        .option-item input {
            margin-right: 8px;
            transform: scale(1.1);
        }

        .report-actions {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }
        .report-btn {
            background: #718093;
            color: white;
            border: none;
            padding: 10px 5px;
            font-size: 12px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .day-group {
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }
        
        .day-header {
            background: #e2e8f0;
            padding: 12px;
            font-weight: bold;
            font-size: 14px;
            color: #4a5568;
            cursor: pointer;
            list-style: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .day-header::-webkit-details-marker { display: none; }
        .day-header::after { content: '▼'; font-size: 10px; color: #718093; }
        .day-group[open] .day-header::after { content: '▲'; }

        .day-content { padding: 12px; background: #fafafa; }

        .log-item {
            background: #fff;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 5px solid #ccc;
            font-size: 14px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .log-time {
            font-weight: bold;
            color: #7f8c8d;
            font-size: 12px;
        }
        .log-img {
            width: 65px;
            height: 65px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #eee;
        }
        .log-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 5px;
        }
        .log-images-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }
        .item-delete-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 2px 5px;
            color: #95a5a6;
        }
        .clear-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            float: right;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-area">
            <h1 data-i18n="app_title">🌱 DigestLog AI</h1>
            <select id="langSelect" onchange="valtsNyelvet(this.value)">
                <option value="en">English</option>
                <option value="hu">Magyar</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
            </select>
        </div>

        <div style="background:#f0f2f5; padding:15px; border-radius:12px; margin-bottom:15px; font-size:12px; border: 1px solid #ddd;">
            <label style="margin:0 0 5px 0; color:#2c3e50;">Google  API Key (Free Testing):</label>
            <input type="password" id="ApiKey" placeholder="AIzaSy..." style="padding:8px; font-size:12px;">
            <div id="aiLoadingStatus" style="color: #3498db; font-weight:bold; margin-top:8px; display:none;">🤖  AI is analyzing image... Please wait...</div>
        </div>

        <div class="tab-navigation">
            <button id="btnTabRögzit" class="tab-btn active" onclick="valtsTabot('rogzites')" data-i18n="tab_new_entry">📝 New Entry</button>
            <button id="btnTabNaplo" class="tab-btn" onclick="valtsTabot('naplo')" data-i18n="tab_log_reports">📊 Log & Reports</button>
        </div>

        <div id="tabRogzites" class="tab-content active">
            
            <div class="section" style="border-top-color: var(--primary);">
                <div class="section-title" data-i18n="sec_food">🍽️ Record Food</div>
                <label class="camera-btn">
                    <span data-i18n="btn_upload_pics">📸 Photo or Upload Images (Multiple)</span>
                    <input type="file" accept="image/*" multiple id="foodPhotoInput" onchange="kezeldAKepeket(this, 'foodDate', 'foodTime', 'foodPreviewCont', 'food')">
                </label>
                <div id="foodPreviewCont" class="preview-grid"></div>

                <label data-i18n="lbl_food_name">Food Name:</label>
                <input type="text" id="foodName" data-i18n-holder="plc_food">
                
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="foodDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="foodTime"></div>
                </div>

                <label data-i18n="lbl_mood">Mood (Optional):</label>
                <div class="grid-options">
                    <label class="option-item"><input type="checkbox" name="foodMood" value="ok"><span data-i18n="m_ok">All OK</span></label>
                    <label class="option-item"><input type="checkbox" name="foodMood" value="low"><span data-i18n="m_low">Low energy</span></label>
                    <label class="option-item"><input type="checkbox" name="foodMood" value="tired"><span data-i18n="m_tired">Tired</span></label>
                    <label class="option-item"><input type="checkbox" name="foodMood" value="stressed"><span data-i18n="m_stressed">Stressed</span></label>
                    <label class="option-item"><input type="checkbox" name="foodMood" value="cheerful"><span data-i18n="m_cheerful">Cheerful</span></label>
                    <label class="option-item"><input type="checkbox" name="foodMood" value="sad"><span data-i18n="m_sad">Sad</span></label>
                </div>

                <button class="action-btn" style="background-color: var(--primary);" onclick="mentesEtel()" data-i18n="btn_save_food">Save Food</button>
            </div>

            <div class="section" style="border-top-color: var(--drink);">
                <div class="section-title" data-i18n="sec_drink">🥤 Record Drink</div>
                <label class="camera-btn">
                    <span data-i18n="btn_upload_pics">📸 Photo or Upload Images (Multiple)</span>
                    <input type="file" accept="image/*" multiple id="drinkPhotoInput" onchange="kezeldAKepeket(this, 'drinkDate', 'drinkTime', 'drinkPreviewCont', 'drink')">
                </label>
                <div id="drinkPreviewCont" class="preview-grid"></div>

                <label data-i18n="lbl_drink_name">Drink Name:</label>
                <input type="text" id="drinkName" data-i18n-holder="plc_drink">
                
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="drinkDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="drinkTime"></div>
                </div>

                <label data-i18n="lbl_mood">Mood (Optional):</label>
                <div class="grid-options">
                    <label class="option-item"><input type="checkbox" name="drinkMood" value="ok"><span data-i18n="m_ok">All OK</span></label>
                    <label class="option-item"><input type="checkbox" name="drinkMood" value="low"><span data-i18n="m_low">Low energy</span></label>
                    <label class="option-item"><input type="checkbox" name="drinkMood" value="tired"><span data-i18n="m_tired">Tired</span></label>
                    <label class="option-item"><input type="checkbox" name="drinkMood" value="stressed"><span data-i18n="m_stressed">Stressed</span></label>
                    <label class="option-item"><input type="checkbox" name="drinkMood" value="cheerful"><span data-i18n="m_cheerful">Cheerful</span></label>
                    <label class="option-item"><input type="checkbox" name="drinkMood" value="sad"><span data-i18n="m_sad">Sad</span></label>
                </div>

                <button class="action-btn" style="background-color: var(--drink);" onclick="mentesItal()" data-i18n="btn_save_drink">Save Drink</button>
            </div>

            <div class="section" style="border-top-color: var(--danger);">
                <div class="section-title" data-i18n="sec_symptom">⚠️ Record Symptom</div>
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="symptomDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="symptomTime"></div>
                </div>
                <label data-i18n="lbl_select_symptoms">Select Symptoms:</label>
                <div class="grid-options">
                    <label class="option-item"><input type="checkbox" name="symptom" value="bloating"><span data-i18n="s_bloating">Bloating</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="stomachache"><span data-i18n="s_stomachache">Stomach ache</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="cramps"><span data-i18n="s_cramps">Abdominal cramps</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="diarrhea"><span data-i18n="s_diarrhea">Diarrhea</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="nausea"><span data-i18n="s_nausea">Nausea</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="constipation"><span data-i18n="s_constipation">Constipation</span></label>
                </div>
                <button class="action-btn" style="background-color: var(--danger);" onclick="mentesTunet()" data-i18n="btn_save_symptom">Save Symptom</button>
            </div>

            <div class="section" style="border-top-color: var(--sleep);">
                <div class="section-title" data-i18n="sec_sleep">⏰ Rhythm & Sleep</div>
                
                <label style="color:var(--sleep)"><b data-i18n="lbl_bedtime">🛏️ BEDTIME:</b></label>
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="sleepStartDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="sleepStartTime" value="23:00"></div>
                </div>

                <label style="color:var(--primary); margin-top: 15px;"><b data-i18n="lbl_wake_time">🌅 WAKE UP TIME:</b></label>
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="sleepEndDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="sleepEndTime" value="07:00"></div>
                </div>

                <label data-i18n="lbl_wake_quality">Wake up feeling (Optional):</label>
                <div style="display:flex; gap:10px;">
                    <label class="option-item" style="flex:1;"><input type="radio" name="wakeQuality" value="refreshed"><span data-i18n="wq_refreshed">Refreshed</span></label>
                    <label class="option-item" style="flex:1;"><input type="radio" name="wakeQuality" value="tired"><span data-i18n="wq_tired">Tired</span></label>
                    <label class="option-item" style="flex:1;"><input type="radio" name="wakeQuality" value="groggy"><span data-i18n="wq_groggy">Groggy</span></label>
                </div>

                <button class="action-btn" style="background-color: var(--sleep);" onclick="mentesAlvas()" data-i18n="btn_save_sleep">Save Sleep Data</button>
            </div>
        </div>

        <div id="tabNaplo" class="tab-content">
            <div class="section" style="border-top-color: #7f8c8d;">
                <div class="section-title" data-i18n="sec_reports">📊 Downloadable Medical Reports</div>
                <div class="report-actions">
                    <button class="report-btn" onclick="riportLetoltes(1)" data-i18n="r_daily">📅 Daily Report</button>
                    <button class="report-btn" onclick="riportLetoltes(7)" data-i18n="r_weekly">🗓️ Weekly Report</button>
                    <button class="report-btn" onclick="riportLetoltes(30)" data-i18n="r_monthly">📅 Monthly Report</button>
                </div>
            </div>

            <div class="section" style="border-top-color: #2c3e50;">
                <div class="section-title">
                    <span data-i18n="sec_history">📜 History Log</span>
                    <button class="clear-btn" onclick="naploTorles()" data-i18n="btn_clear_all">Clear All</button>
                </div>
                <div id="logList">...</div>
            </div>
        </div>

    </div>

        let aktualisNyelv = "en";

        function alapertelmezettIdok() {
            const most = new Date();
            const evHoNap = most.toISOString().split('T')[0];
            const oraPerc = String(most.getHours()).padStart(2, '0') + ':' + String(most.getMinutes()).padStart(2, '0');
            
            document.getElementById('foodDate').value = evHoNap;
            document.getElementById('drinkDate').value = evHoNap;
            document.getElementById('symptomDate').value = evHoNap;
            document.getElementById('sleepStartDate').value = evHoNap;
            document.getElementById('sleepEndDate').value = evHoNap;

            document.getElementById('foodTime').value = oraPerc;
            document.getElementById('drinkTime').value = oraPerc;
            document.getElementById('symptomTime').value = oraPerc;
        }

        function kezeldAKepeket(input, datumID, idomezoID, contID, tipus) {
            const files = input.files;
            if(!files.length) return;

            EXIF.getData(files[0], function() {
                let exifDate = EXIF.getTag(this, "DateTimeOriginal");
                if(exifDate) {
                    let parts = exifDate.split(" ");
                    document.getElementById(datumID).value = parts[0].replace(/:/g, "-");
                    document.getElementById(idomezoID).value = parts[1].substring(0, 5);
                }
            });

            for(let i=0; i<files.length; i++) {
                const fajl = files[i];
                const olvaso = new FileReader();
                olvaso.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        let max_size = 600;
                        let width = img.width;
                        let height = img.height;

                        if (width > height) {
                            if (width > max_size) { height *= max_size / width; width = max_size; }
                        } else {
                            if (height > max_size) { width *= max_size / height; height = max_size; }
                        }
                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        const tomoritettDataUrl = canvas.toDataURL('image/jpeg', 0.7);

                        if(tipus === 'food') {
                            ideiglenesEtelKepek.push(tomoritettDataUrl);
                            hvdAKepfelismerest(tomoritettDataUrl, 'food', 'foodName');
                        }
                        if(tipus === 'drink') {
                            ideiglenesItalKepek.push(tomoritettDataUrl);
                            hvdAKepfelismerest(tomoritettDataUrl, 'drink', 'drinkName');
                        }

                        frissitsKepElonezetet(contID, tipus);
                    };
                    img.src = e.target.result;
                };
                olvaso.readAsDataURL(fajl);
            }
            input.value = "";
        }

        function frissitsKepElonezetet(contID, tipus) {
            const cont = document.getElementById(contID);
            const kepek = (tipus === 'food') ? ideiglenesEtelKepek : ideiglenesItalKepek;
            
            if(kepek.length === 0) { cont.innerHTML = ""; cont.style.display = "none"; return; }
            
            cont.style.display = "flex";
            let html = "";
            kepek.forEach((kp, idx) => {
                html += `
                    <div style="position:relative; width:75px; height:75px;">
                        <img src="${kp}" style="width:100%; height:100%; object-fit:cover; border-radius:8px; border:1px solid #ddd;">
                        <button onclick="egyediKepTorles('${tipus}', ${idx}, '${contID}')" style="position:absolute; top:-5px; right:-5px; background:rgba(231, 76, 60, 0.9); color:white; border:none; border-radius:50%; width:20px; height:20px; font-size:10px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center;">X</button>
                    </div>
                `;
            });
            cont.innerHTML = html;
        }

        function egyediKepTorles(tipus, idx, contID) {
            if(tipus === 'food') ideiglenesEtelKepek.splice(idx, 1);
            if(tipus === 'drink') ideiglenesItalKepek.splice(idx, 1);
            frissitsKepElonezetet(contID, tipus);
        }

        // ÚJ: Kapcsolódás a Google  3.5 Flash modellhez (Ingyenes verzió)
        async function hvdAKepfelismerest(base64Image, tipus, inputMezoId) {
            const apiKey = document.getElementById('ApiKey').value.trim();
            const loadingIndicator = document.getElementById('aiLoadingStatus');
            const inputMezo = document.getElementById(inputMezoId);

            if (!apiKey) {
                alert("Please enter your free Google  API Key first!");
                return;
            }

            loadingIndicator.style.display = "block";
            inputMezo.placeholder = "AI is analyzing with ...";

            // Levágjuk a base64 fejlécet a beküldéshez
            const tisztaBase64 = base64Image.split(',')[1];

            // A prompt meghatározása a választott nyelv szerint
            const promptSzoveg = `You are a medical nutrition assistant for a digestive symptom tracker app. 
            Analyze this food/drink image. Provide a short, concise title/description of the food/drink items visible.
            CRITICAL: You MUST write the response in this language: "${aktualisNyelv.toUpperCase()}". 
            Do not include emojis, do not include chatty text, just give a plain sentence describing what it is (e.g., 'Zabkása eperrel' if language is HU). Max 10 words.`;

            // Google Gemini API végpont (v1beta verzió támogatja a Flash modellt)
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptSzoveg },
                                {
                                    inlineData: {
                                        mimeType: "image/jpeg",
                                        data: tisztaBase64
                                    }
                                }
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    alert("Gemini AI Error: " + data.error.message);
                } else if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                    const aiValasz = data.candidates[0].content.parts[0].text.trim();
                    inputMezo.value = aiValasz;
                } else {
                    alert("The AI couldn't read the image or gave an empty response.");
                }
            } catch (error) {
                console.error("Gemini API Error:", error);
                alert("Network error while calling Gemini AI.");
            } finally {
                loadingIndicator.style.display = "none";
                forditsFelulete();
            }
        }

        function mentestMent(ujAdat) {
            try {
                let jelenlegiNaplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || [];
                ujAdat.id = 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                jelenlegiNaplo.push(ujAdat);
                localStorage.setItem('emesztesNaplo', JSON.stringify(jelenlegiNaplo));
            } catch (e) {
                alert("Storage error / Memory full");
            }
        }

        function gyujtsKedelyt(tipus) {
            const cbs = document.querySelectorAll(`input[name="${tipus}Mood"]:checked`);

        function mentesTunet() {
            const datum = document.getElementById('symptomDate').value;
            const ido = document.getElementById('symptomTime').value;
            const checkboxes = document.querySelectorAll('input[name="symptom"]:checked');
            let kivalasztottTunetek = [];
            checkboxes.forEach((cb) => { kivalasztottTunetek.push(cb.value); cb.checked = false; });

            if(kivalasztottTunetek.length === 0) { alert(szotar[aktualisNyelv].msg_select_symptom); return; }

            mentestMent({
                tipus: 'symptom',
                symptoms: kivalasztottTunetek,
                datum: datum,
                ido: ido
            });
            alert(szotar[aktualisNyelv].msg_saved);
            alapertelmezettIdok();
        }

        function mentesAlvas() {
            const sDate = document.getElementById('sleepStartDate').value;
            const sTime = document.getElementById('sleepStartTime').value;
            const eDate = document.getElementById('sleepEndDate').value;
            const eTime = document.getElementById('sleepEndTime').value;
            
            const qualityRadio = document.querySelector('input[name="wakeQuality"]:checked');
            const quality = qualityRadio ? qualityRadio.value : "";
            if(qualityRadio) qualityRadio.checked = false;

            const startDT = new Date(sDate + 'T' + sTime);
            const endDT = new Date(eDate + 'T' + eTime);
            const diffMs = endDT - startDT;
            
            let diffMins = 0;
            if(diffMs > 0) {
                diffMins = Math.floor(diffMs / 1000 / 60);
            }

            mentestMent({
                tipus: 'sleep_bed',
                datum: sDate,
                ido: sTime
            });

            mentestMent({
                tipus: 'sleep_wake',
                durationMins: diffMins,
                wakeQuality: quality,
                datum: eDate,
                ido: eTime
            });

            alert(szotar[aktualisNyelv].msg_saved);
            alapertelmezettIdok();
        }

                let naplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || [];
                let frissitett = naplo.filter(elem => elem.id !== id);
                localStorage.setItem('emesztesNaplo', JSON.stringify(frissitett));

        function formatAlvasIdo(percek, nyv) {
            if (percek <= 0) return "N/A";
            const hrs = Math.floor(percek / 60);
            const mns = percek % 60;
            return `${hrs} ${nyv.hour_str} ${mns} ${nyv.min_str}`;
        }

        function listazBejegyzesek() {
            const listaHelye = document.getElementById('logList');
            let naplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || [];
            const nyv = szotar[aktualisNyelv];

            if(naplo.length === 0) {
                listaHelye.innerHTML = `<p style='color:#aaa; text-align:center;'>${nyv.no_data}</p>`;
                return;
            }

            naplo.sort((a, b) => (b.datum + "T" + b.ido).localeCompare(a.datum + "T" + a.ido));

            let csoportositott = {};
            naplo.forEach(elem => {
                if (!csoportositott[elem.datum]) csoportositott[elem.datum] = [];
                csoportositott[elem.datum].push(elem);
            });

            const maiDatum = new Date().toISOString().split('T')[0];
            let html = "";

            for (let nap in csoportositott) {
                let dObj = new Date(nap);
                let formazottNap = dObj.toLocaleDateString(aktualisNyelv, { year: 'numeric', month: '2-digit', day: '2-digit' });
                let isOpen = (nap === maiDatum) ? "open" : "";

                html += `
                    <details class="day-group" ${isOpen}>
                        <summary class="day-header">📅 ${formazottNap}</summary>
                        <div class="day-content">
                `;

                csoportositott[nap].forEach(elem => {
                    let szin = "#ccc";
                    let tipusCim = "";
                    let testSzoveg = "";

                    if(elem.tipus === 'food') {
                        szin = "var(--primary)";
                        tipusCim = nyv.type_food;
                        let kajaNev = elem.nev || nyv.unnamed_food;
                        testSzoveg = `<b>${kajaNev}</b>`;
                        if(elem.moods && elem.moods.length > 0) {
                            let leforditottMoods = elem.moods.map(m => nyv['m_'+m] || m).join(', ');
                            testSzoveg += `<br><small>${nyv.log_mood_prefix} ${leforditottMoods}</small>`;
                        }
                    }
                    else if(elem.tipus === 'drink') {
                        szin = "var(--drink)";
                        tipusCim = nyv.type_drink;
                        let italNev = elem.nev || nyv.unnamed_drink;
                        testSzoveg = `<b>${italNev}</b>`;
                        if(elem.moods && elem.moods.length > 0) {
                            let leforditottMoods = elem.moods.map(m => nyv['m_'+m] || m).join(', ');
                            testSzoveg += `<br><small>${nyv.log_mood_prefix} ${leforditottMoods}</small>`;
                        }
                    }
                    else if(elem.tipus === 'symptom') {
                        szin = "var(--danger)";
                        tipusCim = nyv.type_symptom;
                        let tünetekLista = (elem.symptoms || []).map(s => nyv['s_'+s] || s).join(', ');
                        testSzoveg = `⚠️ <b>${nyv.log_symptom_prefix}</b> ${tünetekLista}`;
                    }
                    else if(elem.tipus === 'sleep_bed') {
                        szin = "var(--sleep)";
                        tipusCim = nyv.type_sleep;
                        testSzoveg = `🛏️ <b>${nyv.log_bedtime}</b>`;
                    }
                    else if(elem.tipus === 'sleep_wake') {
                        szin = "var(--sleep)";
                        tipusCim = nyv.type_sleep;
                        testSzoveg = `🌅 <b>${nyv.log_wake}</b><br><small>${nyv.log_duration} ${formatAlvasIdo(elem.durationMins, nyv)}</small>`;
                        if(elem.wakeQuality) {
                            testSzoveg += `<br><small>${nyv.lbl_wake_quality} ${nyv['wq_'+elem.wakeQuality] || elem.wakeQuality}</small>`;
                        }
                    }

                    let kepekHtml = "";
                    if(elem.kepek && elem.kepek.length > 0) {
                        kepekHtml = `<div class="log-images-container">`;
                        elem.kepek.forEach(kp => { kepekHtml += `<img src="${kp}" class="log-img">`; });
                        kepekHtml += `</div>`;
                    }

                    html += `
                        <div class="log-item" style="border-left-color: ${szin}">
                            <div class="log-time" style="display:flex; justify-content:space-between; align-items:center;">
                                <span>${elem.ido} - [${tipusCim}]</span>
                                <button class="item-delete-btn" onclick="event.stopPropagation(); elemTorles('${elem.id}')">🗑️</button>
                            </div>
                            <div class="log-body">
                                <div>${testSzoveg}</div>
                                ${kepekHtml}
                            </div>
                        </div>
                    `;
                });

                html += `</div></details>`;
            }
            listaHelye.innerHTML = html;
        }

        function ripszurtNaplo(napokSzama) { /* Elírás javítás a gombhoz */ }

        function riportLetoltes(napokSzama) {
            let naplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || [];
            const nyv = szotar[aktualisNyelv];
            if(naplo.length === 0) { alert(nyv.msg_no_report_data); return; }

            const hatarIdo = new Date();
            hatarIdo.setDate(hatarIdo.getDate() - napokSzama);

            let szurtNaplo = naplo.filter(elem => new Date(elem.datum) >= hatarIdo);
            szurtNaplo.sort((a, b) => (a.datum + "T" + a.ido).localeCompare(a.datum + "T" + a.ido));

            if(szurtNaplo.length === 0) { alert(nyv.msg_no_report_data); return; }

            let szoveg = `========================================\n      DIGESTLOG AI - MEDICAL REPORT    \n========================================\n\n`;
            let aktualisDatum = "";
            szurtNaplo.forEach(elem => {
                if(elem.datum !== aktualisDatum) {
                    aktualisDatum = elem.datum;
                    let dObj = new Date(aktualisDatum);
                    szoveg += `\n📅 DATE: ${dObj.toLocaleDateString(aktualisNyelv)}\n----------------------------------------\n`;
                }
                
                let tisztaSor = "";
                if(elem.tipus === 'food') {
                    let mStr = (elem.moods || []).map(m => nyv['m_'+m]).join(', ');
                    tisztaSor = `${nyv.type_food}: ${elem.nev || nyv.unnamed_food} ${mStr ? '('+nyv.log_mood_prefix+' '+mStr+')' : ''}`;
                } else if(elem.tipus === 'drink') {
                    let mStr = (elem.moods || []).map(m => nyv['m_'+m]).join(', ');
                    tisztaSor = `${nyv.type_drink}: ${elem.nev || nyv.unnamed_drink} ${mStr ? '('+nyv.log_mood_prefix+' '+mStr+')' : ''}`;
                } else if(elem.tipus === 'symptom') {
                    tisztaSor = `${nyv.type_symptom}: ${(elem.symptoms || []).map(s => nyv['s_'+s]).join(', ')}`;
                } else if(elem.tipus === 'sleep_bed') {
                    tisztaSor = `${nyv.type_sleep}: ${nyv.log_bedtime}`;
                } else if(elem.tipus === 'sleep_wake') {
                    tisztaSor = `${nyv.type_sleep}: ${nyv.log_wake} - ${nyv.log_duration} ${formatAlvasIdo(elem.durationMins, nyv)} ${elem.wakeQuality ? '['+nyv['wq_'+elem.wakeQuality]+']' : ''}`;
                }

                tisztaSor = tisztaSor.replace(/<[^>]*>/g, '');
                szoveg += `[${elem.ido}] - ${tisztaSor}\n`;
            });

            let blob = new Blob([szoveg], {type: "text/plain;charset=utf-8"});
            let link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Medical_Report_${napokSzama}_days.txt`;
            link.click();
        }

        function naploTorles() {
            if(confirm(szotar[aktualisNyelv].msg_confirm_clear)) { 
                localStorage.removeItem('emesztesNaplo'); 
                listazBejegyzesek(); 
            }
        }
    </script>

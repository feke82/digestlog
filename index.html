<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigestLog MVP</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 500px; margin: 20px auto; padding: 15px; background: #f0f2f5; color: #333; }
        .box { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        h3 { margin-top: 0; color: #1a1a1a; font-size: 16px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ccc; border-radius: 8px; }
        button { width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #0056b3; }
        #output { white-space: pre-wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef; min-height: 60px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Google Gemini API Key (Free Testing)</h3>
        <input type="text" id="apiKey" placeholder="AIzaSy...">
    </div>
    
    <div class="box">
        <h3>Étel vagy Ital fotó feltöltése</h3>
        <input type="file" id="imageInput" accept="image/*">
        <button id="analyzeBtn">Elemzés indítása</button>
    </div>

    <div class="box">
        <h3>Eredmény</h3>
        <div id="output">Még nincs adat. Tölts fel egy képet az elemzéshez.</div>
    </div>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const apiKey = document.getElementById('apiKey').value.trim();
            const fileInput = document.getElementById('imageInput');
            const outputDiv = document.getElementById('output');

            if (!apiKey) { alert('Kérlek, add meg az API kulcsot!'); return; }
            if (fileInput.files.length === 0) { alert('Kérlek, válassz ki egy képet!'); return; }

            outputDiv.innerText = "A Gemini AI elemzi a képet... Kérlek várj.";
            const file = fileInput.files[0];
            
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onloadend = async () => {
                const base64Data = reader.result.split(',')[1];
                const mimeType = file.type;

                const payload = {
                    contents: [{
                        parts: [
                            { text: "Elemezd ezt az ételt vagy italt. Írd le pontosan mi ez, mik az összetevői, és becsüld meg a kalória- valamint makrotápanyag-tartalmát magyarul." },
                            { inlineData: { mimeType: mimeType, data: base64Data } }
                        ]
                    }]
                };

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();
                    
                    if (data.candidates && data.candidates[0].content.parts[0].text) {
                        outputDiv.innerText = data.candidates[0].content.parts[0].text;
                    } else if (data.error) {
                        outputDiv.innerText = "API Hiba: " + data.error.message;
                    } else {
                        outputDiv.innerText = "Ismeretlen hiba történt a válasz feldolgozásakor.";
                    }
                } catch (error) {
                    outputDiv.innerText = "Hálózati hiba a szerverhez való csatlakozáskor: " + error.message;
                }
            };
        });
    </script>
</body>
</html>

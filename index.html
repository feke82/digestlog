<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigestLog AI</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exif-js/2.3.0/exif.min.js"></script>
    <style>
        :root {
            --primary: #2ecc71; --drink: #3498db; --consumption: #e67e22;
            --danger: #e74c3c; --sleep: #9b59b6; --bg: #f5f6fa; --card: #ffffff; --text: #2f3640;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg); color: var(--text); margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
        }
        .app-container { width: 100%; max-width: 480px; box-sizing: border-box; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h1 { color: #2c3e50; font-size: 22px; margin: 0; }
        #langSelect { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; background: white; font-weight: bold; font-size: 13px; cursor: pointer; }
        .section {
            background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 6px solid var(--primary);
        }
        .section-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        label { display: block; margin-top: 12px; margin-bottom: 6px; font-size: 14px; font-weight: 600; }
        .datetime-container { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
        input[type="date"], input[type="time"], input[type="text"], input[type="password"] {
            width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px;
        }
        .camera-btn, .action-trigger-btn {
            background-color: #f1f2f6; border: 2px dashed #ccc; color: #57606f; padding: 12px 5px;
            border-radius: 8px; width: 100%; font-size: 13px; font-weight: bold; cursor: pointer;
            text-align: center; display: inline-block; box-sizing: border-box;
        }
        .action-trigger-btn { border-style: solid; background: #f1f2f6; color: #2c3e50; }
        .camera-btn input[type="file"] { display: none; }
        .preview-grid { display: none; flex-wrap: wrap; gap: 10px; margin-top: 10px; margin-bottom: 10px; }
        .action-btn { color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        .grid-options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .option-item { display: flex; align-items: center; background: #f8f9fa; padding: 10px; border-radius: 8px; border: 1px solid #eee; cursor: pointer; font-size: 13px; }
        .option-item input { margin-right: 8px; transform: scale(1.1); }
        .report-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .report-btn { background: #718093; color: white; border: none; padding: 10px 5px; font-size: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .day-group { background: white; border-radius: 12px; margin-bottom: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); overflow: hidden; border: 1px solid #e2e8f0; }
        .day-header { background: #e2e8f0; padding: 12px; font-weight: bold; font-size: 14px; color: #4a5568; cursor: pointer; list-style: none; display: flex; justify-content: space-between; align-items: center; }
        .day-header::-webkit-details-marker { display: none; }
        .day-header::after { content: '▼'; font-size: 10px; color: #718093; }
        .day-group[open] .day-header::after { content: '▲'; }
        .day-content { padding: 12px; background: #fafafa; }
        .log-item { background: #fff; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #ccc; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .log-time { font-weight: bold; color: #7f8c8d; font-size: 12px; }
        .log-img { width: 65px; height: 65px; object-fit: cover; border-radius: 6px; border: 1px solid #eee; }
        .log-body { display: flex; flex-direction: column; gap: 8px; margin-top: 5px; }
        .log-images-container { display: flex; flex-wrap: wrap; gap: 6px; }
        .item-delete-btn { background: none; border: none; font-size: 16px; cursor: pointer; padding: 2px 5px; color: #95a5a6; }
        .clear-btn { background: #e74c3c; color: white; border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px; float: right; cursor: pointer; }
        .toggle-block { display: none; margin-top: 15px; border-top: 1px dashed #eee; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="header-area">
            <h1 data-i18n="app_title">🌱 DigestLog AI</h1>
            <select id="langSelect" onchange="valtsNyelvet(this.value)">
                <option value="en">English</option>
                <option value="hu">Magyar</option>
                <option value="de">Deutsch</option>
                <option value="es">Español</option>
                <option value="fr">Français</option>
            </select>
        </div>

        <div style="background:#f0f2f5; padding:15px; border-radius:12px; margin-bottom:15px; font-size:12px; border: 1px solid #ddd;">
            <label style="margin:0 0 5px 0; color:#2c3e50;">Google Gemini API Key (Free Testing):</label>
            <input type="password" id="geminiApiKey" placeholder="AIzaSy..." style="padding:8px; font-size:12px;">
            <div id="aiLoadingStatus" style="color: #3498db; font-weight:bold; margin-top:8px; display:none;">🤖 Gemini AI is analyzing image... Please wait...</div>
        </div>

        <div class="section" style="border-top-color: var(--consumption);">
            <div class="section-title" data-i18n="sec_consumption">🍽️ Fogyasztás rögzítése</div>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <label class="camera-btn" style="flex: 1;">
                    <span data-i18n="btn_photo">📸 Fotó</span>
                    <input type="file" accept="image/*" capture="environment" id="consCameraInput" onchange="kezeldAFogyasztast(this, 'camera')">
                </label>
                <label class="camera-btn" style="flex: 1;">
                    <span data-i18n="btn_upload">📂 Feltöltés</span>
                    <input type="file" accept="image/*" multiple id="consUploadInput" onchange="kezeldAFogyasztast(this, 'upload')">
                </label>
                <button class="action-trigger-btn" style="flex: 1;" onclick="mutasdKezit()" data-i18n="btn_manual">✍️ Kézi</button>
            </div>

            <div id="consumptionPreviewCont" class="preview-grid"></div>

            <div id="consumptionFormFields" class="toggle-block">
                <label data-i18n="lbl_cons_type">Type:</label>
                <div style="display: flex; gap: 10px;">
                    <label class="option-item" style="flex: 1; justify-content: center;"><input type="radio" name="consType" value="food" id="radioFood"><span data-i18n="type_food">Food</span></label>
                    <label class="option-item" style="flex: 1; justify-content: center;"><input type="radio" name="consType" value="drink" id="radioDrink"><span data-i18n="type_drink">Drink</span></label>
                </div>

                <label data-i18n="lbl_cons_name">Name / Description:</label>
                <input type="text" id="consName" data-i18n-holder="plc_cons">
                
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="consDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="consTime"></div>
                </div>

                <label data-i18n="lbl_mood">Mood (Optional):</label>
                <div class="grid-options">
                    <label class="option-item"><input type="checkbox" name="consMood" value="ok"><span data-i18n="m_ok">All OK</span></label>
                    <label class="option-item"><input type="checkbox" name="consMood" value="low"><span data-i18n="m_low">Low energy</span></label>
                    <label class="option-item"><input type="checkbox" name="consMood" value="tired"><span data-i18n="m_tired">Tired</span></label>
                    <label class="option-item"><input type="checkbox" name="consMood" value="stressed"><span data-i18n="m_stressed">Stressed</span></label>
                    <label class="option-item"><input type="checkbox" name="consMood" value="cheerful"><span data-i18n="m_cheerful">Cheerful</span></label>
                    <label class="option-item"><input type="checkbox" name="consMood" value="sad"><span data-i18n="m_sad">Sad</span></label>
                </div>
                <button class="action-btn" style="background-color: var(--consumption);" onclick="mentesFogyasztas()" data-i18n="btn_save_cons">Save Entry</button>
            </div>
        </div>

        <div class="section" style="border-top-color: var(--sleep);">
            <div class="section-title" data-i18n="sec_rhythm">⏰ Ritmus</div>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <button class="action-trigger-btn" style="flex: 1;" onclick="toggleSzekcioBlokk('sleep')" data-i18n="btn_record_sleep">🛏️ Alvás rögzítése</button>
                <button class="action-trigger-btn" style="flex: 1;" onclick="toggleSzekcioBlokk('symptom')" data-i18n="btn_record_symptom">⚠️ Tünet rögzítése</button>
            </div>

            <div id="sleepFormFields" class="toggle-block">
                <label style="color:var(--sleep)"><b data-i18n="lbl_bedtime">🛏️ BEDTIME:</b></label>
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="sleepStartDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="sleepStartTime" value="23:00"></div>
                </div>
                <label style="color:var(--primary); margin-top: 15px;"><b data-i18n="lbl_wake_time">🌅 WAKE UP TIME:</b></label>
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="sleepEndDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="sleepEndTime" value="07:00"></div>
                </div>
                <label data-i18n="lbl_wake_quality">Wake up feeling (Optional):</label>
                <div style="display:flex; gap:10px;">
                    <label class="option-item" style="flex:1;"><input type="radio" name="wakeQuality" value="refreshed"><span data-i18n="wq_refreshed">Refreshed</span></label>
                    <label class="option-item" style="flex:1;"><input type="radio" name="wakeQuality" value="tired"><span data-i18n="wq_tired">Tired</span></label>
                    <label class="option-item" style="flex:1;"><input type="radio" name="wakeQuality" value="groggy"><span data-i18n="wq_groggy">Groggy</span></label>
                </div>
                <button class="action-btn" style="background-color: var(--sleep);" onclick="mentesAlvas()" data-i18n="btn_save_sleep">Save Sleep Data</button>
            </div>

            <div id="symptomFormFields" class="toggle-block">
                <div class="datetime-container">
                    <div><label data-i18n="lbl_date">Date:</label><input type="date" id="symptomDate"></div>
                    <div><label data-i18n="lbl_time">Time:</label><input type="time" id="symptomTime"></div>
                </div>
                <label data-i18n="lbl_select_symptoms">Select Symptoms:</label>
                <div class="grid-options">
                    <label class="option-item"><input type="checkbox" name="symptom" value="bloating"><span data-i18n="s_bloating">Bloating</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="stomachache"><span data-i18n="s_stomachache">Stomach ache</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="cramps"><span data-i18n="s_cramps">Abdominal cramps</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="diarrhea"><span data-i18n="s_diarrhea">Diarrhea</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="nausea"><span data-i18n="s_nausea">Nausea</span></label>
                    <label class="option-item"><input type="checkbox" name="symptom" value="constipation"><span data-i18n="s_constipation">Constipation</span></label>
                </div>
                <button class="action-btn" style="background-color: var(--danger);" onclick="mentesTunet()" data-i18n="btn_save_symptom">Save Symptom</button>
            </div>
        </div>

        <div class="section" style="border-top-color: #2c3e50;">
            <div class="section-title" data-i18n="sec_log_main">📊 Napló</div>
            <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                <button class="action-trigger-btn" style="flex: 1;" onclick="toggleSzekcioBlokk('history')" data-i18n="btn_log_view">📜 Napló</button>
                <button class="action-trigger-btn" style="flex: 1;" onclick="toggleSzekcioBlokk('reports')" data-i18n="btn_reports_view">📈 Riportok</button>
            </div>

            <div id="reportFields" class="toggle-block">
                <div class="report-actions">
                    <button class="report-btn" onclick="riportLetoltes(1)" data-i18n="r_daily">📅 Daily Report</button>
                    <button class="report-btn" onclick="riportLetoltes(7)" data-i18n="r_weekly">🗓️ Weekly Report</button>
                    <button class="report-btn" onclick="riportLetoltes(30)" data-i18n="r_monthly">📅 Monthly Report</button>
                </div>
            </div>

            <div id="historyFields" class="toggle-block">
                <div style="margin-bottom: 10px; overflow: hidden;">
                    <button class="clear-btn" onclick="naploTorles()" data-i18n="btn_clear_all">Clear All</button>
                </div>
                <div id="logList">...</div>
            </div>
        </div>

    </div>

    <script>
        const szotar = {
            en: {
                app_title: "🌱 DigestLog AI", sec_consumption: "🍽️🥤 Record Consumption", btn_photo: "📸 Photo", btn_upload: "📂 Upload", btn_manual: "✍️ Manual",
                lbl_cons_type: "Type:", lbl_cons_name: "Name / Description:", plc_cons: "E.g. Oatmeal, Coffee...", lbl_date: "Date:", lbl_time: "Time:", lbl_mood: "Mood (Optional):", btn_save_cons: "Save Consumption",
                sec_symptom: "⚠️ Record Symptom", lbl_select_symptoms: "Select Symptoms:", btn_save_symptom: "Save Symptom", sec_sleep: "⏰ Rhythm & Sleep", lbl_bedtime: "🛏️ BEDTIME:", lbl_wake_time: "🌅 WAKE UP TIME:",
                lbl_wake_quality: "Wake up feeling (Optional):", btn_save_sleep: "Save Sleep Data", r_daily: "📅 Daily Report", r_weekly: "🗓️ Weekly Report", r_monthly: "📅 Monthly Report",
                btn_clear_all: "Clear All", no_data: "No data logged yet.", m_ok: "All OK", m_low: "Low energy", m_tired: "Tired", m_stressed: "Stressed", m_cheerful: "Cheerful", m_sad: "Sad",
                s_bloating: "Bloating", s_stomachache: "Stomach ache", s_cramps: "Abdominal cramps", s_diarrhea: "Diarrhea", s_nausea: "Nausea", s_constipation: "Constipation", wq_refreshed: "Refreshed", wq_tired: "Tired", wq_groggy: "Groggy",
                msg_saved: "Saved successfully!", msg_select_symptom: "Please select at least one symptom!", msg_confirm_delete: "Are you sure you want to delete this item?", msg_confirm_clear: "Are you sure you want to clear ALL data?", msg_no_report_data: "No data found for this period.",
                type_food: "Food", type_drink: "Drink", type_symptom: "Symptom", type_sleep: "Sleep", log_bedtime: "Went to bed", log_wake: "Woke up", log_duration: "Sleep duration:", log_mood_prefix: "Mood:", log_symptom_prefix: "Symptoms:", unnamed_food: "Unnamed Food", unnamed_drink: "Unnamed Drink", unnamed_cons: "Unnamed Item", hour_str: "hours", min_str: "minutes",
                sec_rhythm: "⏰ Rhythm", btn_record_sleep: "🛏️ Sleep Entry", btn_record_symptom: "⚠️ Symptom Entry", sec_log_main: "📊 Log & Reports", btn_log_view: "📜 History Log", btn_reports_view: "📈 Medical Reports"
            },
            hu: {
                app_title: "🌱 DigestLog AI", sec_consumption: "🍽️ Fogyasztás rögzítése", btn_photo: "📸 Fotó", btn_upload: "📂 Feltöltés", btn_manual: "✍️ Kézi",
                lbl_cons_type: "Típus:", lbl_cons_name: "Megnevezés:", plc_cons: "Pl: Zabkása, Espresso, Rostos üdítő...", lbl_date: "Dátum:", lbl_time: "Időpont:", lbl_mood: "Kedélyállapot (opcionális):", btn_save_cons: "Fogyasztás mentése",
                sec_symptom: "⚠️ Tünet rögzítése", lbl_select_symptoms: "Válaszd ki a tüneteket:", btn_save_symptom: "Tünet mentése", sec_sleep: "⏰ Ritmus & Alvás", lbl_bedtime: "🛏️ LEFEKVÉS:", lbl_wake_time: "🌅 ÉBREDÉS:",
                lbl_wake_quality: "Ébredési állapot (opcionális):", btn_save_sleep: "Alvásadatok mentése", r_daily: "📅 Napi riport", r_weekly: "🗓️ Heti riport", r_monthly: "📅 Havi riport",
                btn_clear_all: "Mindent töröl", no_data: "Még nincs rögzített adat.", m_ok: "Minden OK", m_low: "Levert", m_tired: "Fáradt", m_stressed: "Stresszes", m_cheerful: "Vidám", m_sad: "Szomorú",
                s_bloating: "Puffadás", s_stomachache: "Gyomorfájás", s_cramps: "Bélgörcs", s_diarrhea: "Hasmenés", s_nausea: "Hányinger", s_constipation: "Szorulás", wq_refreshed: "Kipihenten", wq_tired: "Fáradtan", wq_groggy: "Kómásan",
                msg_saved: "Sikeresen elmentve!", msg_select_symptom: "Válassz ki legalább egy tünetet!", msg_confirm_delete: "Biztosan törlöd ezt a tételt?", msg_confirm_clear: "Biztosan törlöd az ÖSSZES adatot?", msg_no_report_data: "Nincs adat ebben az időszakban.",
                type_food: "Étel", type_drink: "Ital", type_symptom: "Tünet", type_sleep: "Alvás", log_bedtime: "Lefekvés aludni", log_wake: "Ébredés", log_duration: "Alvásidőtartam:", log_mood_prefix: "Kedélyállapot:", log_symptom_prefix: "Tünetek:", unnamed_food: "Névtelen étel", unnamed_drink: "Névtelen ital", unnamed_cons: "Névtelen tétel", hour_str: "óra", min_str: "perc",
                sec_rhythm: "⏰ Ritmus", btn_record_sleep: "🛏️ Alvás rögzítése", btn_record_symptom: "⚠️ Tünet rögzítése", sec_log_main: "📊 Napló", btn_log_view: "📜 Napló", btn_reports_view: "📈 Riportok"
            }
        };

        let aktualisNyelv = "en";
        let ideiglenesFogyasztasKepek = [];

        window.onload = function() { detektaljNyelvet(); alapertelmezettIdok(); listazBejegyzesek(); };

        function detektaljNyelvet() {
            let devLang = navigator.language.substring(0, 2);
            aktualisNyelv = szotar[devLang] ? devLang : "en";
            document.getElementById('langSelect').value = aktualisNyelv;
            forditsFelulete();
        }

        function valtsNyelvet(ujLang) { aktualisNyelv = ujLang; forditsFelulete(); listazBejegyzesek(); }

        function forditsFelulete() {
            const nyv = szotar[aktualisNyelv];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const k = el.getAttribute('data-i18n'); if(nyv[k]) el.innerText = nyv[k];
            });
            document.querySelectorAll('[data-i18n-holder]').forEach(el => {
                const k = el.getAttribute('data-i18n-holder'); if(nyv[k]) el.placeholder = nyv[k];
            });
        }

        function toggleSzekcioBlokk(tipus) {
            if(tipus === 'sleep') {
                const el = document.getElementById('sleepFormFields'); const vis = el.style.display === 'block';
                el.style.display = vis ? 'none' : 'block'; document.getElementById('symptomFormFields').style.display = 'none';
            } else if(tipus === 'symptom') {
                const el = document.getElementById('symptomFormFields'); const vis = el.style.display === 'block';
                el.style.display = vis ? 'none' : 'block'; document.getElementById('sleepFormFields').style.display = 'none';
            } else if(tipus === 'history') {
                const el = document.getElementById('historyFields'); const vis = el.style.display === 'block';
                el.style.display = vis ? 'none' : 'block'; if(!vis) listazBejegyzesek();
            } else if(tipus === 'reports') {
                const el = document.getElementById('reportFields'); el.style.display = el.style.display === 'block' ? 'none' : 'block';
            }
        }

        function alapertelmezettIdok() {
            const most = new Date(); const evHoNap = most.toISOString().split('T')[0];
            const oraPerc = String(most.getHours()).padStart(2, '0') + ':' + String(most.getMinutes()).padStart(2, '0');
            if(document.getElementById('consDate')) document.getElementById('consDate').value = evHoNap;
            if(document.getElementById('consTime')) document.getElementById('consTime').value = oraPerc;
            document.getElementById('symptomDate').value = evHoNap; document.getElementById('sleepStartDate').value = evHoNap;
            document.getElementById('sleepEndDate').value = evHoNap; document.getElementById('symptomTime').value = oraPerc;
        }

        function mutasdKezit() {
            ideiglenesFogyasztasKepek = []; frissitsKepElonezetet();
            document.getElementById('consName').value = ''; document.getElementById('radioFood').checked = false; document.getElementById('radioDrink').checked = false;
            alapertelmezettIdok(); document.getElementById('consumptionFormFields').style.display = 'block';
        }

        function kezeldAFogyasztast(input, mod) {
            const files = input.files; if(!files.length) return;
            document.getElementById('consumptionFormFields').style.display = 'block';
            alapertelmezettIdok();

            if (mod !== 'camera') {
                EXIF.getData(files[0], function() {
                    let exifDate = EXIF.getTag(this, "DateTimeOriginal");
                    if(exifDate) {
                        let parts = exifDate.split(" ");
                        document.getElementById('consDate').value = parts[0].replace(/:/g, "-");
                        document.getElementById('consTime').value = parts[1].substring(0, 5);
                    }
                });
            }

            for(let i=0; i<files.length; i++) {
                const fajl = files[i]; const olvaso = new FileReader();
                olvaso.onload = function(e) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas'); let max_size = 600; let width = img.width; let height = img.height;
                        if (width > height) { if (width > max_size) { height *= max_size / width; width = max_size; } } 
                        else { if (height > max_size) { width *= max_size / height; height = max_size; } }
                        canvas.width = width; canvas.height = height;
                        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                        const tomoritettDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                        ideiglenesFogyasztasKepek.push(tomoritettDataUrl);
                        if(i === 0) hvdAGeminiFogyasztasErtekeles(tomoritettDataUrl);
                        frissitsKepElonezetet();
                    };
                    img.src = e.target.result;
                };
                olvaso.readAsDataURL(fajl);
            }
            input.value = "";
        }

        function frissitsKepElonezetet() {
            const cont = document.getElementById('consumptionPreviewCont');
            if(ideiglenesFogyasztasKepek.length === 0) { cont.innerHTML = ""; cont.style.display = "none"; return; }
            cont.style.display = "flex"; let html = "";
            ideiglenesFogyasztasKepek.forEach((kp, idx) => {
                html += `<div style="position:relative; width:75px; height:75px;"><img src="${kp}" style="width:100%; height:100%; object-fit:cover; border-radius:8px; border:1px solid #ddd;"><button onclick="egyediKepTorles(${idx})" style="position:absolute; top:-5px; right:-5px; background:rgba(231, 76, 60, 0.9); color:white; border:none; border-radius:50%; width:20px; height:20px; font-size:10px; font-weight:bold; cursor:pointer; display:flex; align-items:center; justify-content:center;">X</button></div>`;
            });
            cont.innerHTML = html;
        }

        function egyediKepTorles(idx) { ideiglenesFogyasztasKepek.splice(idx, 1); frissitsKepElonezetet(); }

        async function hvdAGeminiFogyasztasErtekeles(base64Image) {
            const apiKey = document.getElementById('geminiApiKey').value.trim();
            const loadingIndicator = document.getElementById('aiLoadingStatus');
            const inputMezo = document.getElementById('consName');
            if (!apiKey) { alert("Please enter your free Google Gemini API Key first!"); return; }

            loadingIndicator.style.display = "block"; inputMezo.placeholder = "AI is analyzing with Gemini...";
            const tisztaBase64 = base64Image.split(',')[1];
            const promptSzoveg = `You are a medical nutrition assistant. Analyze this image. Determine if it is predominantly a "food" or a "drink". Then provide a short description. Format exact template: TYPE: [food or drink] NAME: [short plain description] Language: "${aktualisNyelv.toUpperCase()}". Max 10 words.`;
            
            // JAVÍTVA: gemini-3.5-flash végpont
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.5-flash:generateContent?key=${apiKey}`;

            try {
                const response = await fetch(url, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: promptSzoveg }, { inlineData: { mimeType: "image/jpeg", data: tisztaBase64 } }] }] })
                });
                const data = await response.json();
                if (data.error) { alert("Gemini AI Error: " + data.error.message); } 
                else if (data.candidates && data.candidates[0].content && data.candidates[0].content.parts) {
                    const aiValasz = data.candidates[0].content.parts[0].text.trim();
                    let lines = aiValasz.split('\n'); let detektaltTipus = 'food'; let detektaltNev = '';
                    lines.forEach(line => {
                        if (line.toUpperCase().includes('TYPE:')) { if (line.toUpperCase().includes('DRINK')) detektaltTipus = 'drink'; }
                        if (line.toUpperCase().includes('NAME:')) detektaltNev = line.replace(/NAME:\s*/i, '').trim();
                    });
                    if(!detektaltNev) detektaltNev = aiValasz;
                    document.getElementById(detektaltTipus === 'food' ? 'radioFood' : 'radioDrink').checked = true;
                    inputMezo.value = detektaltNev;
                } else { alert("The AI couldn't read the image."); }
            } catch (error) { alert("Network error while calling Gemini AI."); } 
            finally { loadingIndicator.style.display = "none"; forditsFelulete(); }
        }

        function mentestMent(ujAdat) {
            try {
                let jelenlegiNaplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || [];
                ujAdat.id = 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                jelenlegiNaplo.push(ujAdat); localStorage.setItem('emesztesNaplo', JSON.stringify(jelenlegiNaplo));
            } catch (e) { alert("Storage error / Memory full"); }
        }

        function mentesFogyasztas() {
            const typeRadio = document.querySelector('input[name="consType"]:checked');
            if(!typeRadio) { alert(aktualisNyelv === 'hu' ? "Kérlek válaszd ki a típust!" : "Please select the type!"); return; }
            const tipus = typeRadio.value;
            const nev = document.getElementById('consName').value.trim() || (tipus === 'food' ? szotar[aktualisNyelv].unnamed_food : szotar[aktualisNyelv].unnamed_drink);
            const cbs = document.querySelectorAll(`input[name="consMood"]:checked`); let moods = [];
            cbs.forEach(cb => { moods.push(cb.value); cb.checked = false; });
            
            mentestMent({
                tipus: tipus, nev: nev, moods: moods,
                datum: document.getElementById('consDate').value, ido: document.getElementById('consTime').value,
                kepek: [...ideiglenesFogyasztasKepek]
            });
            document.getElementById('consName').value = ''; typeRadio.checked = false; ideiglenesFogyasztasKepek = []; frissitsKepElonezetet();
            document.getElementById('consumptionFormFields').style.display = 'none';
            alert(szotar[aktualisNyelv].msg_saved); alapertelmezettIdok(); if(document.getElementById('historyFields').style.display === 'block') listazBejegyzesek();
        }

        function mentesTunet() {
            const checkboxes = document.querySelectorAll('input[name="symptom"]:checked'); let kivalasztottTunetek = [];
            checkboxes.forEach((cb) => { kivalasztottTunetek.push(cb.value); cb.checked = false; });
            if(kivalasztottTunetek.length === 0) { alert(szotar[aktualisNyelv].msg_select_symptom); return; }

            mentestMent({ tipus: 'symptom', symptoms: kivalasztottTunetek, datum: document.getElementById('symptomDate').value, ido: document.getElementById('symptomTime').value });
            document.getElementById('symptomFormFields').style.display = 'none';
            alert(szotar[aktualisNyelv].msg_saved); alapertelmezettIdok(); if(document.getElementById('historyFields').style.display === 'block') listazBejegyzesek();
        }

        function mentesAlvas() {
            const sDate = document.getElementById('sleepStartDate').value; const sTime = document.getElementById('sleepStartTime').value;
            const eDate = document.getElementById('sleepEndDate').value; const eTime = document.getElementById('sleepEndTime').value;
            const qualityRadio = document.querySelector('input[name="wakeQuality"]:checked'); const quality = qualityRadio ? qualityRadio.value : "";
            if(qualityRadio) qualityRadio.checked = false;
            const diffMs = new Date(eDate + 'T' + eTime) - new Date(sDate + 'T' + sTime);
            let diffMins = diffMs > 0 ? Math.floor(diffMs / 1000 / 60) : 0;

            mentestMent({ tipus: 'sleep_bed', datum: sDate, ido: sTime });
            mentestMent({ tipus: 'sleep_wake', durationMins: diffMins, wakeQuality: quality, datum: eDate, ido: eTime });
            document.getElementById('sleepFormFields').style.display = 'none';
            alert(szotar[aktualisNyelv].msg_saved); alapertelmezettIdok(); if(document.getElementById('historyFields').style.display === 'block') listazBejegyzesek();
        }

        function elemTorles(id) {
            if(confirm(szotar[aktualisNyelv].msg_confirm_delete)) {
                let naplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || [];
                localStorage.setItem('emesztesNaplo', JSON.stringify(naplo.filter(elem => elem.id !== id)));
                listazBejegyzesek();
            }
        }

        function formatAlvasIdo(percek, nyv) {
            if (percek <= 0) return "N/A";
            return `${Math.floor(percek / 60)} ${nyv.hour_str} ${percek % 60} ${nyv.min_str}`;
        }

        function listazBejegyzesek() {
            const listaHelye = document.getElementById('logList'); let naplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || []; const nyv = szotar[aktualisNyelv];
            if(naplo.length === 0) { listaHelye.innerHTML = `<p style='color:#aaa; text-align:center;'>${nyv.no_data}</p>`; return; }
            naplo.sort((a, b) => (b.datum + "T" + b.ido).localeCompare(a.datum + "T" + a.ido));
            let csoportositott = {}; naplo.forEach(elem => { if (!csoportositott[elem.datum]) csoportositott[elem.datum] = []; csoportositott[elem.datum].push(elem); });
            const maiDatum = new Date().toISOString().split('T')[0]; let html = "";

            for (let nap in csoportositott) {
                let formazottNap = new Date(nap).toLocaleDateString(aktualisNyelv, { year: 'numeric', month: '2-digit', day: '2-digit' });
                html += `<details class="day-group" ${nap === maiDatum ? "open" : ""}><summary class="day-header">📅 ${formazottNap}</summary><div class="day-content">`;
                csoportositott[nap].forEach(elem => {
                    let szin = "#ccc"; let tipusCim = ""; let testSzoveg = "";
                    if(elem.tipus === 'food' || elem.tipus === 'drink') {
                        szin = elem.tipus === 'food' ? "var(--consumption)" : "var(--drink)"; tipusCim = elem.tipus === 'food' ? nyv.type_food : nyv.type_drink;
                        testSzoveg = `<b>${elem.nev || (elem.tipus === 'food' ? nyv.unnamed_food : nyv.unnamed_drink)}</b>`;
                        if(elem.moods && elem.moods.length > 0) testSzoveg += `<br><small>${nyv.log_mood_prefix} ${elem.moods.map(m => nyv['m_'+m] || m).join(', ')}</small>`;
                    } else if(elem.tipus === 'symptom') {
                        szin = "var(--danger)"; tipusCim = nyv.type_symptom; testSzoveg = `⚠️ <b>${nyv.log_symptom_prefix}</b> ${(elem.symptoms || []).map(s => nyv['s_'+s] || s).join(', ')}`;
                    } else if(elem.tipus === 'sleep_bed') {
                        szin = "var(--sleep)"; tipusCim = nyv.type_sleep; testSzoveg = `🛏️ <b>${nyv.log_bedtime}</b>`;
                    } else if(elem.tipus === 'sleep_wake') {
                        szin = "var(--sleep)"; tipusCim = nyv.type_sleep; testSzoveg = `🌅 <b>${nyv.log_wake}</b><br><small>${nyv.log_duration} ${formatAlvasIdo(elem.durationMins, nyv)}</small>`;
                        if(elem.wakeQuality) testSzoveg += `<br><small>${nyv.lbl_wake_quality} ${nyv['wq_'+elem.wakeQuality] || elem.wakeQuality}</small>`;
                    }
                    let kepekHtml = ""; if(elem.kepek && elem.kepek.length > 0) { kepekHtml = `<div class="log-images-container">`; elem.kepek.forEach(kp => { kepekHtml += `<img src="${kp}" class="log-img">`; }); kepekHtml += `</div>`; }
                    html += `<div class="log-item" style="border-left-color: ${szin}"><div class="log-time" style="display:flex; justify-content:space-between; align-items:center;"><span>${elem.ido} - [${tipusCim}]</span><button class="item-delete-btn" onclick="event.stopPropagation(); elemTorles('${elem.id}')">🗑️</button></div><div class="log-body"><div>${testSzoveg}</div>${kepekHtml}</div></div>`;
                });
                html += `</div></details>`;
            }
            listaHelye.innerHTML = html;
        }

        function riportLetoltes(napokSzama) {
            let naplo = JSON.parse(localStorage.getItem('emesztesNaplo')) || []; const nyv = szotar[aktualisNyelv]; if(naplo.length === 0) { alert(nyv.msg_no_report_data); return; }
            const hatarIdo = new Date(); hatarIdo.setDate(hatarIdo.getDate() - napokSzama);
            let szurtNaplo = naplo.filter(elem => new Date(elem.datum) >= hatarIdo).sort((a, b) => (a.datum + "T" + a.ido).localeCompare(a.datum + "T" + a.ido));
            if(szurtNaplo.length === 0) { alert(nyv.msg_no_report_data); return; }

            let szoveg = `========================================\n      DIGESTLOG AI - MEDICAL REPORT    \n========================================\n\n`;
            let aktualisDatum = "";
            szurtNaplo.forEach(elem => {
                if(elem.datum !== aktualisDatum) { aktualisDatum = elem.datum; szoveg += `\n📅 DATE: ${new Date(aktualisDatum).toLocaleDateString(aktualisNyelv)}\n----------------------------------------\n`; }
                let tisztaSor = "";
                if(elem.tipus === 'food' || elem.tipus === 'drink') {
                    let mStr = (elem.moods || []).map(m => nyv['m_'+m]).join(', ');
                    tisztaSor = `${elem.tipus === 'food' ? nyv.type_food : nyv.type_drink}: ${elem.nev || (elem.tipus === 'food' ? nyv.unnamed_food : nyv.unnamed_drink)} ${mStr ? '('+nyv.log_mood_prefix+' '+mStr+')' : ''}`;
                } else if(elem.tipus === 'symptom') { tisztaSor = `${nyv.type_symptom}: ${(elem.symptoms || []).map(s => nyv['s_'+s]).join(', ')}`; } 
                else if(elem.tipus === 'sleep_bed') { tisztaSor = `${nyv.type_sleep}: ${nyv.log_bedtime}`; } 
                else if(elem.tipus === 'sleep_wake') { tisztaSor = `${nyv.type_sleep}: ${nyv.log_wake} - ${nyv.log_duration} ${formatAlvasIdo(elem.durationMins, nyv)} ${elem.wakeQuality ? '['+nyv['wq_'+elem.wakeQuality]+']' : ''}`; }
                szoveg += `[${elem.ido}] - ${tisztaSor.replace(/<[^>]*>/g, '')}\n`;
            });

            let link = document.createElement("a"); link.href = URL.createObjectURL(new Blob([szoveg], {type: "text/plain;charset=utf-8"})); link.download = `Medical_Report_${napokSzama}_days.txt`; link.click();
        }

        function naploTorles() { if(confirm(szotar[aktualisNyelv].msg_confirm_clear)) { localStorage.removeItem('emesztesNaplo'); listazBejegyzesek(); } }
    </script>
